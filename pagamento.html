<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dock - Pagamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-[var(--bg-color)] text-[var(--font-color)] font-sans">
    <section class="flex flex-col min-h-screen">
      <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-md mx-auto">
        <div class="bg-white rounded-2xl shadow-xl p-8 w-full border-t-8 border-[var(--comp-color)]">
          <h1 class="text-2xl font-extrabold mb-6 text-center text-[var(--font-color)]">Adicionar Saldo</h1>
          
          <form onsubmit="realizarPagamento(event)" class="space-y-5">
            <div>
              <label class="block text-sm font-semibold mb-1">E-mail</label>
              <input type="email" id="email" class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:border-[var(--comp-color)] focus:outline-none transition-colors" placeholder="seu@email.com" required>
            </div>

            <div>
              <label class="block text-sm font-semibold mb-1">Opção de Carregamento</label>
              <select id="valor" class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:border-[var(--comp-color)] focus:outline-none transition-colors" required>
                <option value="" disabled selected>Escolha uma opção</option>
                <option value="1">1€ - 30%</option>
                <option value="3">3€ - 100%</option>
              </select>
            </div>

            <div>
              <label class="block text-sm font-semibold mb-1">Número do Cartão</label>
              <input type="text" class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:border-[var(--comp-color)] focus:outline-none transition-colors" placeholder="**** **** **** ****" required maxlength="19">
            </div>

            <div class="flex gap-4">
              <div class="flex-1">
                <label class="block text-sm font-semibold mb-1">Validade</label>
                <input type="text" class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:border-[var(--comp-color)] focus:outline-none transition-colors" placeholder="MM/AA" required maxlength="5">
              </div>
              <div class="flex-1">
                <label class="block text-sm font-semibold mb-1">CVV</label>
                <input type="text" class="w-full px-4 py-3 rounded-lg border-2 border-gray-200 focus:border-[var(--comp-color)] focus:outline-none transition-colors" placeholder="123" required maxlength="4">
              </div>
            </div>

            <button type="submit" class="w-full py-4 mt-6 bg-[var(--font-color)] text-[var(--bg-color)] font-bold rounded-lg uppercase tracking-wider hover:bg-[var(--comp-color)] transition-colors duration-300">
              Confirmar Pagamento
            </button>
          </form>

          <!-- Simulação de Sucesso -->
          <div id="msg-sucesso" class="hidden mt-6 text-center text-green-600 font-bold bg-green-100 p-4 rounded-lg">
            Pagamento aprovado com sucesso!
          </div>
        </div>
      </main>
    </section>

    <script>
      function realizarPagamento(e) {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const msg = document.getElementById('msg-sucesso');
        
        btn.innerHTML = 'Processando...';
        btn.disabled = true;
        btn.classList.add('opacity-50');

        // Simula tempo de API
        setTimeout(() => {
          btn.innerHTML = 'Confirmar Pagamento';
          btn.disabled = false;
          btn.classList.remove('opacity-50');
          
          // Envia o valor pago como número inteiro para o App Inventor
          const valorInput = document.getElementById('valor').value;
          const emailInput = document.getElementById('email').value;
          // Garante que é tratado como inteiro (ex: 10.50 vira 10)
          const valorInteiro = Math.floor(Number(valorInput));
          
          // Integração com Supabase (Guardar e-mail e valor)
          const SUPABASE_URL = "https://cvzhdxfomjxawjwxjmnh.supabase.co";
          const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2emhkeGZvbWp4YXdqd3hqbW5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNjc0MzgsImV4cCI6MjA4ODk0MzQzOH0.t6cljClgMgGiCiInch1aYUaR-4v7d35HUYp2yh9mdyU";
          
          fetch(`${SUPABASE_URL}/rest/v1/pagamentos`, {
            method: 'POST',
            headers: {
              "apikey": SUPABASE_KEY,
              "Authorization": "Bearer " + SUPABASE_KEY,
              "Content-Type": "application/json",
              "Prefer": "return=minimal"
            },
            body: JSON.stringify({ email: emailInput, valor: valorInteiro, data_pagamento: new Date().toISOString() })
          }).catch(err => console.error("Erro Supabase:", err));

            if (window.AppInventor) {
              window.AppInventor.setWebViewString(valorInteiro.toString());
          }

          e.target.reset();
          
          msg.classList.remove('hidden');
          setTimeout(() => {
            msg.classList.add('hidden');
            window.location.href = "index.html";
          }, 2000);
        }, 1500);
      }
    </script>
  </body>
</html>
