<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dock - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
    <!-- Iniciar Tema --><script>if(sessionStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
  </head>
  <body>
    <section class="flex flex-col min-h-screen bg-[var(--bg-color)] text-[var(--font-color)] font-sans">
      <nav class="flex justify-between items-center p-6">
        <a href="notificacoes.html" class="px-4 py-2 font-semibold text-sm rounded-full bg-white shadow-sm hover:ring-2 hover:ring-[var(--comp-color)] transition-all">Notificações</a>
        <a href="config.html" class="px-4 py-2 font-semibold text-sm rounded-full bg-white shadow-sm hover:ring-2 hover:ring-[var(--comp-color)] transition-all">Configurações</a>
      </nav>
      
      <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-md mx-auto gap-8">
        <h1 class="text-2xl font-extrabold mb-2 text-center text-[var(--font-color)]">Controlo Físico</h1>
        
        <div class="w-full relative touch-none select-none">
          <button id="btn-unlock" 
            onmousedown="iniciarDesbloqueio()" onmouseup="cancelarDesbloqueio()" onmouseleave="cancelarDesbloqueio()"
            ontouchstart="iniciarDesbloqueio()" ontouchend="cancelarDesbloqueio()"
            class="w-full py-8 text-2xl font-black tracking-wider rounded-2xl bg-gray-200 text-gray-500 shadow-inner transition-all flex flex-col items-center justify-center relative overflow-hidden group">
            
            <div id="unlock-progress" class="absolute left-0 top-0 bottom-0 bg-green-500 w-0 transition-all ease-linear" style="transition-duration: 0.3s;"></div>
            
            <div class="relative z-10 flex flex-col items-center text-gray-600 transition-colors drop-shadow-md" id="unlock-content">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-3 drop-shadow-md" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" />
              </svg>
              SEGURA PARA ABRIR DOCK
            </div>
          </button>
        </div>

        <div class="w-full relative touch-none select-none mt-2">
          <button id="btn-lock" 
            onmousedown="iniciarBloqueio()" onmouseup="cancelarBloqueio()" onmouseleave="cancelarBloqueio()"
            ontouchstart="iniciarBloqueio()" ontouchend="cancelarBloqueio()"
            class="w-full py-8 text-2xl font-black tracking-wider rounded-2xl bg-gray-200 text-gray-500 shadow-inner transition-all flex flex-col items-center justify-center relative overflow-hidden group">
            
            <div id="lock-progress" class="absolute left-0 right-0 top-0 bottom-0 bg-red-500 w-0 transition-all ease-linear ml-auto" style="transition-duration: 0.3s; width: 0%;"></div>
            
            <div class="relative z-10 flex flex-col items-center text-gray-600 transition-colors drop-shadow-md" id="lock-content">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-3 drop-shadow-md" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
              SEGURA PARA FECHAR DOCK
            </div>
          </button>
        </div>

      </main>

      <footer class="flex w-full mt-auto bg-[var(--font-color)] text-[var(--bg-color)]">
        <a href="graficos.html" class="flex-1 py-5 text-center text-sm font-bold uppercase tracking-wider hover:bg-[var(--comp-color)] hover:text-[var(--font-color)] transition-colors duration-300">Gráficos</a>
        <a href="index.html" class="flex-1 py-5 text-center text-sm font-bold uppercase tracking-wider hover:bg-[var(--comp-color)] hover:text-[var(--font-color)] transition-colors duration-300 border-l border-[var(--bg-color)]/20">Home</a>
        <a href="controlador.html" class="flex-1 py-5 text-center text-sm font-bold uppercase tracking-wider bg-[var(--comp-color)] text-[var(--font-color)] transition-colors duration-300 border-l border-[var(--bg-color)]/20">Controlador</a>
      </footer>
    </section>

    <script>
      function atualizarCoresBotoes() {
        const isAberto = sessionStorage.getItem('cacifoAberto') === 'true';
        
        const btnU = document.getElementById('btn-unlock');
        const contU = document.getElementById('unlock-content');
        const btnL = document.getElementById('btn-lock');
        const contL = document.getElementById('lock-content');

        if (isAberto) {
          btnU.classList.replace('bg-gray-200', 'bg-green-500');
          btnU.classList.replace('text-gray-500', 'text-white');
          contU.classList.replace('text-gray-600', 'text-white');

          btnL.classList.replace('bg-red-500', 'bg-gray-200');
          btnL.classList.replace('text-white', 'text-gray-500');
          contL.classList.replace('text-white', 'text-gray-600');
        } else {
          btnU.classList.replace('bg-green-500', 'bg-gray-200');
          btnU.classList.replace('text-white', 'text-gray-500');
          contU.classList.replace('text-white', 'text-gray-600');

          btnL.classList.replace('bg-gray-200', 'bg-red-500');
          btnL.classList.replace('text-gray-500', 'text-white');
          contL.classList.replace('text-gray-600', 'text-white');
        }
      }

      window.onload = atualizarCoresBotoes;

      // --- LOGICA DE SEGURAR PARA DESBLOQUEAR ---
      let unlockTimer;
      function iniciarDesbloqueio() {
        const progresso = document.getElementById('unlock-progress');
        const content = document.getElementById('unlock-content');
        
        progresso.style.transitionDuration = '1.5s';
        progresso.style.width = '100%';
        content.classList.add('text-white');
        content.classList.remove('text-gray-600');

        unlockTimer = setTimeout(() => {
          enviarComando('UNLOCK');
          progresso.style.transitionDuration = '0.2s';
          progresso.style.width = '0%';
          if (navigator.vibrate) navigator.vibrate(200);
        }, 1500);
      }

      function cancelarDesbloqueio() {
        clearTimeout(unlockTimer);
        const progresso = document.getElementById('unlock-progress');
        
        progresso.style.transitionDuration = '0.3s';
        progresso.style.width = '0%';
        atualizarCoresBotoes();
      }

      // --- LOGICA DE SEGURAR PARA BLOQUEAR (fecha) ---
      let lockTimer;
      function iniciarBloqueio() {
        const progresso = document.getElementById('lock-progress');
        const content = document.getElementById('lock-content');
        
        progresso.style.transitionDuration = '1.5s';
        progresso.style.width = '100%';
        content.classList.add('text-white');
        content.classList.remove('text-gray-600');

        lockTimer = setTimeout(() => {
          enviarComando('LOCK');
          progresso.style.transitionDuration = '0.2s';
          progresso.style.width = '0%';
          if (navigator.vibrate) navigator.vibrate(200);
        }, 1500);
      }

      function cancelarBloqueio() {
        clearTimeout(lockTimer);
        const progresso = document.getElementById('lock-progress');
        
        progresso.style.transitionDuration = '0.3s';
        progresso.style.width = '0%';
        atualizarCoresBotoes();
      }


      function enviarComando(acao) {
        const msg = document.getElementById('status-msg');
        
        // Colocamos o prefixo 'CMD:' para o seu sistema distinguir que isto é para fechar portas e não dinheiro
        const comando = "CMD:" + acao; 
        
        if (window.AppInventor) {
          // O App inventor vai intercetar "CMD:UNLOCK"
          window.AppInventor.setWebViewString(comando);
        } else {
          console.log("Comando Simulado na Web: " + comando);
        }

        // Guarda o estado do cacifo para a tela principal
        if (acao === 'UNLOCK') {
          sessionStorage.setItem('cacifoAberto', 'true');
        } else {
          sessionStorage.setItem('cacifoAberto', 'false');
        }
        
        atualizarCoresBotoes();
      }
    </script>
  </body>
</html>
