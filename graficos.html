<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dock - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section class="flex flex-col min-h-screen bg-[var(--bg-color)] text-[var(--font-color)] font-sans">
      <nav class="flex justify-between items-center p-6">
        <button class="px-4 py-2 font-semibold text-sm rounded-full bg-white shadow-sm hover:ring-2 hover:ring-[var(--comp-color)] transition-all">Notificações</button>
        <button class="px-4 py-2 font-semibold text-sm rounded-full bg-white shadow-sm hover:ring-2 hover:ring-[var(--comp-color)] transition-all">Configurações</button>
      </nav>
      
      <main class="flex-1 flex flex-col items-center justify-start p-6 w-full max-w-lg mx-auto">
        <h1 class="text-2xl font-extrabold mb-6 text-center text-[var(--comp-color)]">Evolução da Bateria</h1>
        
        <div class="bg-white p-4 rounded-xl shadow-lg w-full mb-8">
          <canvas id="bateriaChart"></canvas>
        </div>

        <p class="text-sm text-center text-gray-400 mt-2">Dica: Os dados atualizam baseados no ESP32 do dispositivo.</p>
      </main>

      <footer class="flex w-full mt-auto bg-[var(--font-color)] text-[var(--bg-color)] cursor-pointer">
        <a href="graficos.html" class="flex-1 py-5 text-center text-sm font-bold uppercase tracking-wider bg-[var(--comp-color)] text-[var(--font-color)] transition-colors duration-300">Gráficos</a>
        <a href="index.html" class="flex-1 py-5 text-center text-sm font-bold uppercase tracking-wider hover:bg-[var(--comp-color)] hover:text-[var(--font-color)] transition-colors duration-300 border-l border-[var(--bg-color)]/20">Home</a>
        <a href="controlador.html" class="flex-1 py-5 text-center text-sm font-bold uppercase tracking-wider hover:bg-[var(--comp-color)] hover:text-[var(--font-color)] transition-colors duration-300 border-l border-[var(--bg-color)]/20">Controlador</a>
      </footer>
    </section>

    <!-- Script do Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      let chart;
      
      // Simulação inicial de log: Array de {hora, nivel}
      // Lógica de cálculo do Carregamento (Bateria Aumentada vs Tempo Juntos)
      let chargeLog = JSON.parse(localStorage.getItem('chargeLog')) || [];
      // { tempoMs: , startBattery: } -> guarda o momento e a bateria exata que a trotinete tinha quando foi conectada
      let startInfo = JSON.parse(localStorage.getItem('chargeStartInfo')) || null;

      function renderizarGrafico() {
        const ctx = document.getElementById('bateriaChart').getContext('2d');
        
        // Começa em 0s com 0% ganhos por padrão
        const labels = chargeLog.length > 0 ? chargeLog.map(d => d.tempoStr) : ['0s'];
        const data = chargeLog.length > 0 ? chargeLog.map(d => d.ganho) : [0];

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Bateria Carregada (+%)',
                    data: data,
                    borderColor: '#10B981', // Verde esmeralda (energia)
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    borderWidth: 3,
                    tension: 0.3,
                    fill: true,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#10B981',
                    pointRadius: 4
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        title: { display: true, text: 'Ganho Energético (%)', font: { weight: 'bold' } }
                    },
                    x: {
                        title: { display: true, text: 'Tempo a carregar na Dock', font: { weight: 'bold' } }
                    }
                }
            }
        });
      }

      function calcularRelacaoCarga() {
        const bateriaVindaDoESP = localStorage.getItem('bateriaAtual');
        
        if (bateriaVindaDoESP) {
          let bateriaAtualInt = parseInt(bateriaVindaDoESP);
          
          // Se não houver sessão de carga registrada, ou se a bateria DE REPENTE DIMINUIU muito (alguém a retirou e colocou outra vazia)
          if (!startInfo || bateriaAtualInt < startInfo.startBattery) {
            startInfo = { tempoMs: Date.now(), startBattery: bateriaAtualInt };
            localStorage.setItem('chargeStartInfo', JSON.stringify(startInfo));
            chargeLog = []; // Reinicia o gráfico limpo!
          }

          // Matemática: Quanto subiu desdo o minuto zero?
          let ganhoPercentual = bateriaAtualInt - startInfo.startBattery;
          
          // Matemática: Quanto tempo passou desde o minuto zero?
          let passedMs = Date.now() - startInfo.tempoMs;
          let passedSecs = Math.floor(passedMs / 1000);
          let passedMins = Math.floor(passedSecs / 60);
          let remainderSecs = passedSecs % 60;
          
          let strCronometro = passedMins > 0 ? `${passedMins}m ${remainderSecs}s` : `${remainderSecs}s`;

          // Regista este ponto no gráfico
          chargeLog.push({ tempoStr: strCronometro, ganho: ganhoPercentual });
          
          // Não deixa o gráfico "infinito" - Guarda apenas os últimos 12 pontos lidos para ter visão focada
          if (chargeLog.length > 12) chargeLog.shift();
          
          localStorage.setItem('chargeLog', JSON.stringify(chargeLog));

          // Atualiza instantaneamente a tela
          if(chart) {
            chart.data.labels = chargeLog.map(d => d.tempoStr);
            chart.data.datasets[0].data = chargeLog.map(d => d.ganho);
            chart.update();
          }
        }
      }

      // Renderiza assim que a página abre
      renderizarGrafico();
      // Executa o "Inspetor de Bateria" a cada 3 segundos, puxando do ESP32
      setInterval(calcularRelacaoCarga, 3000);
    </script>
  </body>
</html>
