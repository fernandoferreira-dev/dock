<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dock - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
    <!-- Iniciar Tema --><script>if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
  </head>
  <body>
    <section class="flex flex-col min-h-screen bg-[var(--bg-color)] text-[var(--font-color)] font-sans">
      <nav class="flex justify-between items-center p-6">
        <div id="bt-status" class="flex items-center gap-2 text-xs font-bold text-red-600 bg-red-100 px-3 py-1.5 rounded-full transition-colors shadow-sm">
          <span id="bt-dot" class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></span>
          <span id="bt-text">A aguardar Doca...</span>
        </div>
        <div class="flex gap-2">
          <a href="notificacoes.html" class="px-4 py-2 font-semibold text-sm rounded-full bg-white shadow-sm hover:ring-2 hover:ring-[var(--comp-color)] transition-all flex items-center gap-2">
            <span id="badge-notificacao" class="hidden flex h-3 w-3 relative">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
            </span>
          </a>
          <a href="config.html" class="px-4 py-2 font-semibold text-sm rounded-full bg-white shadow-sm hover:ring-2 hover:ring-[var(--comp-color)] transition-all">Configurações</a>
        </div>
      </nav>
      
      <main class="flex-1 flex flex-col items-center justify-center p-6 w-full max-w-md mx-auto">
        <div class="relative w-64 h-64 rounded-full bg-white shadow-2xl flex flex-col items-center justify-center border-8 border-[var(--comp-color)] mb-8 flex-shrink-0 group hover:scale-105 transition-transform duration-500">
          <div class="absolute inset-0 rounded-full border-[12px] border-[var(--comp-color)] opacity-20 animate-ping"></div>
          <img src="./assets/logo.png" alt="Trotineta" class="w-24 h-24 object-contain mb-4 z-10 drop-shadow-md" />
          <p class="text-5xl font-black text-[var(--font-color)] z-10 tracking-tight flex flex-col items-center">
            <span id="bateria">--%</span>
            <span id="tempo-restante" class="text-sm font-bold text-gray-400 mt-2 tracking-normal opacity-0 transition-opacity">A calcular...</span>
          </p>
        </div>

        <button onclick="terminarCarregamento()" class="w-full max-w-[250px] py-4 text-sm font-extrabold tracking-wider rounded-xl bg-red-500 text-white shadow-md hover:bg-red-600 active:scale-95 transition-all text-center">
          TERMINAR CARREGAMENTO
        </button>

        <div id="end-charge-msg" class="hidden mt-4 text-center text-sm font-bold p-3 rounded-lg w-full max-w-[250px]">
        </div>
      </main>

      <footer class="flex w-full mt-auto bg-[var(--font-color)] text-[var(--bg-color)]">
        <a href="graficos.html" class="flex-1 py-5 text-center text-sm font-bold uppercase tracking-wider hover:bg-[var(--comp-color)] hover:text-[var(--font-color)] transition-colors duration-300">Gráficos</a>
        <a href="index.html" class="flex-1 py-5 text-center text-sm font-bold uppercase tracking-wider bg-[var(--comp-color)] text-[var(--font-color)] transition-colors duration-300 border-l border-[var(--bg-color)]/20">Home</a>
        <a href="controlador.html" class="flex-1 py-5 text-center text-sm font-bold uppercase tracking-wider hover:bg-[var(--comp-color)] hover:text-[var(--font-color)] transition-colors duration-300 border-l border-[var(--bg-color)]/20">Controlador</a>
      </footer>
    </section>

    <script>
      //  VERIFICAÇÃO DE LOGIN BLUETOOTH
      // Se não passou pelo ecrã de login e meteu a password, é chutado para lá!
      if(localStorage.getItem("autenticado") !== "true") {
        window.location.href = "login.html";
      }

      // Função para o botão terminar carregamento
      function terminarCarregamento() {
        const msg = document.getElementById('end-charge-msg');
        
        // Verifica se no ecrã do controlador o botão de abrir cacifo foi clicado
        if (localStorage.getItem('cacifoAberto') === 'true') {
          // Envia o comando de parar pelo AppInventor se necessário
          if (window.AppInventor) {
            window.AppInventor.setWebViewString("CMD:END_CHARGE");
            setTimeout(() => {
              window.AppInventor.setWebViewString("CMD:DISCONNECT");
            }, 500);
          }
          
          msg.innerText = "Carregamento terminado, a desconectar...";
          msg.className = "mt-4 text-center text-sm font-bold bg-green-100 text-green-700 p-3 rounded-lg w-full max-w-[250px] transition-all";
          
          // Opcional: fechar a sessão ou resetar estado
          localStorage.removeItem('cacifoAberto');
          localStorage.removeItem('autenticado');
          
          setTimeout(() => {
            window.location.href = "login.html";
          }, 2500);
        } else {
          msg.innerText = "Abra o cacifo no Controlador primeiro!";
          msg.className = "mt-4 text-center text-sm font-bold bg-red-100 text-red-600 p-3 rounded-lg w-full max-w-[250px] transition-all";
        }
        
        setTimeout(() => {
          msg.classList.add('hidden');
          msg.className = "hidden mt-4 text-center text-sm font-bold p-3 rounded-lg w-full max-w-[250px]";
        }, 3000);
      }

      // Guarda valores históricos de bateria para o gráfico localmente (opcionalmente pode vir do Supabase)
      if (!window.bateriaHistorico) window.bateriaHistorico = [];

      let ultimaAtualizacaoBluetooth = 0;

      function updateConnectionStatus(isOnline) {
        const statusDiv = document.getElementById('bt-status');
        const dot = document.getElementById('bt-dot');
        const txt = document.getElementById('bt-text');
        
        if (isOnline) {
          statusDiv.className = "flex items-center gap-2 text-xs font-bold text-green-700 bg-green-100 px-3 py-1.5 rounded-full transition-colors shadow-sm";
          dot.className = "w-2 h-2 rounded-full bg-green-600";
          txt.innerText = "Conectado";
        } else {
          statusDiv.className = "flex items-center gap-2 text-xs font-bold text-red-600 bg-red-100 px-3 py-1.5 rounded-full transition-colors shadow-sm";
          dot.className = "w-2 h-2 rounded-full bg-red-600 animate-pulse";
          txt.innerText = "A procurar doca...";
          document.getElementById('tempo-restante').classList.add('opacity-0');
        }
      }

      function atualizarTempoRestante(percentagem) {
        const p = parseInt(percentagem);
        const trNode = document.getElementById('tempo-restante');
        trNode.classList.remove('opacity-0');
        
        if (isNaN(p)) return;
        if (p >= 100) {
          trNode.innerText = "Completamente carregado";
          trNode.className = "text-sm font-bold text-green-500 mt-2 tracking-normal transition-opacity";
          return;
        }

        // Estimativa simples: 1% recarrega em 1.5 minutos (0 a 100 em 2.5h).
        const faltamPerc = 100 - p;
        const minRestantes = Math.floor(faltamPerc * 1.5);
        
        trNode.className = "text-sm font-bold text-gray-500 mt-2 tracking-normal transition-opacity";
        if (minRestantes > 60) {
          const horas = Math.floor(minRestantes / 60);
          const minutos = minRestantes % 60;
          trNode.innerText = `~${horas}h ${minutos}m restantes`;
        } else {
          trNode.innerText = `~${minRestantes}m restantes`;
        }
      }

      // Automatically receive data from App Inventor's WebViewString
      function checkAppInventorData() {
        if (window.AppInventor) {
          const webString = window.AppInventor.getWebViewString();
          if (webString) {
            const bateriaElement = document.getElementById("bateria");
            if (bateriaElement) {
              // Verifica se vem do ESP32 no formato "SPACES: s,b | s,b | s,b | s,b"
              if (webString.includes("SPACES:")) {
                ultimaAtualizacaoBluetooth = Date.now();
                updateConnectionStatus(true);
                
                // Remove prefixo e divide pelos slots
                const slotsStr = webString.replace("SPACES:", "").trim().split("|");
                // Vamos supor que a trotinete deste cliente é o Slot 1 (s0 no código do esp) ou procure o primeiro slot ocupado com bateria > 0
                let bateriaEncontrada = "0%";
                for (let i = 0; i < slotsStr.length; i++) {
                  const s = slotsStr[i].trim().split(",");
                  if (s[0] === "1") { // Se estiver ocupado, s == 1
                    bateriaEncontrada = s[1].trim() + "%";
                    gerarNotificacaoLimites(s[1].trim());
                    break;
                  }
                }
                bateriaElement.innerText = bateriaEncontrada;
                atualizarTempoRestante(bateriaEncontrada);
                localStorage.setItem('bateriaAtual', bateriaEncontrada.replace('%', ''));
              } else {
                ultimaAtualizacaoBluetooth = Date.now();
                updateConnectionStatus(true);
                // Caso o AppInventor retorne apenas um número diretamente
                bateriaElement.innerText = webString.includes("%") ? webString : webString + "%";
                localStorage.setItem('bateriaAtual', webString.replace('%', ''));
                gerarNotificacaoLimites(webString.replace('%', ''));
                atualizarTempoRestante(webString.replace('%', ''));
              }
            }
          }
        }
      }

      // Check initially when the page loads
      window.onload = function() {
        checkAppInventorData();
        // Constantly poll for updates so it updates automatically when the string changes
        setInterval(checkAppInventorData, 1000);
        // Verifica se há novas notificações para piscar a luzinha
        setInterval(checkNotificacoesBadge, 2000);
        
        // Verifica a cada 2segundos se passou muito tempo sem ouvir do hardware (ex:3.5s) para marcar offline
        setInterval(() => {
          if(Date.now() - ultimaAtualizacaoBluetooth > 3500) {
            updateConnectionStatus(false);
          }
        }, 2000);
      };

      let jaNotificou = false; // flag em memória para não spammar

      function gerarNotificacaoLimites(bateriaValue) {
        // Exemplo: se pagou 1€, o limite é 30% (guardado no localStorage quando fez o bypass ou real)
        const limiteCarregamento = parseInt(localStorage.getItem('limiteCarregamento')) || 100;
        const b = parseInt(bateriaValue);

        if (!jaNotificou && b >= limiteCarregamento) {
          jaNotificou = true;
          
          let novaMensagem = "Sua trotinete atingiu o limite de carregamento (" + b + "%).";
          
          let notificacoes = JSON.parse(localStorage.getItem('notificacoes') || '[]');
          notificacoes.unshift(novaMensagem); // põe no começo
          localStorage.setItem('notificacoes', JSON.stringify(notificacoes));
          
          // Conta as não lidas
          let naoLidadas = parseInt(localStorage.getItem('notificacoes_nao_lidas') || '0');
          localStorage.setItem('notificacoes_nao_lidas', (naoLidadas + 1).toString());
          
          // Pode ativar uma buzina no App Inventor, enviar Toast notification etc.
          if (window.AppInventor) {
             window.AppInventor.setWebViewString("CMD:NOTIFY_LIMIT_REACHED");
          } else {
             // Notificação do navegador (se suportado/aceite) ou apenas alert native
             if ("Notification" in window && Notification.permission === "granted") {
                new Notification("Terminado!", {body: novaMensagem});
             } else {
                alert("Nova Notificação: " + novaMensagem);
             }
          }
        }
      }

      function checkNotificacoesBadge() {
         const badge = document.getElementById('badge-notificacao');
         let naoLidas = parseInt(localStorage.getItem('notificacoes_nao_lidas') || '0');
         if (naoLidas > 0) {
            badge.classList.remove('hidden');
         } else {
            badge.classList.add('hidden');
         }
      }
    </script>
  </body>
</html>
